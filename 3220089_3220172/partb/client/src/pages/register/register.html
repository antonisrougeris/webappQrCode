<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic metadata -->
  <meta charset="UTF-8" />
  <title>DevDromos - Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSS order: reset -> theme -> layout -> components -->
  <link rel="stylesheet" href="/assets/css/reset.css" />
  <link rel="stylesheet" href="/assets/css/theme.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>

<body>
  <!-- Shared site header (logo + nav + cart link + mobile menu button) -->
  <header class="site-header">
    <div class="container header-content">
      <div class="logo">
        <!-- Fix: Use correct image path -->
        <img class="logo-img" src="/assets/img/logo_Image.png" alt="DevDromos logo" />
        <span class="logo-text">DevDromos</span>
      </div>

      <!-- Mobile menu toggle (handled by menu.js + responsive.js) -->
      <button
        id="menuToggle"
        class="menu-toggle"
        aria-label="Toggle menu"
        aria-expanded="false"
        aria-controls="mainNav"
      >
        ☰
      </button>

      <!-- Navigation: data-cart-link is updated by cart-badge.js -->
      <nav id="mainNav" class="main-nav">
        <a href="/index.html">Home</a>
        <a href="/src/pages/courses/courses.html">Courses</a>
        <a href="/src/pages/books/books.html">Books</a>
        <a href="/src/pages/about/about.html">About</a>
        <a href="/src/pages/cart/cart.html" data-cart-link>Cart</a>
        <a href="/src/pages/login/login.html" class="btn-outline">Login</a>
        <a href="/src/pages/register/register.html" class="btn-primary active">Register</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <!-- Page title -->
    <h1>Create your account</h1>

    

    <!-- Registration form
         - id="registerForm" is used by register_form.js
         - novalidate disables the browser popup UI (we show custom JS errors) -->
    <form id="registerForm" class="card form-grid" novalidate>

      <!-- Basic user info -->
      <div class="form-field">
        <label for="firstName">First name *</label>
        <input id="firstName" name="firstName" type="text" required />
      </div>

      <div class="form-field">
        <label for="lastName">Last name *</label>
        <input id="lastName" name="lastName" type="text" required />
      </div>

      <div class="form-field">
        <label for="email">Email *</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="form-field">
        <label for="phone">Phone *</label>
        <input id="phone" name="phone" type="tel" required />
      </div>

      <!-- Account credentials -->
      <div class="form-field">
        <label for="password">Password *</label>
        <input id="password" name="password" type="password" required />
      </div>

      <div class="form-field">
        <label for="confirmPassword">Confirm password *</label>
        <input id="confirmPassword" name="confirmPassword" type="password" required />
      </div>

      <!-- Birth date used for age validation in register_form.js -->
      <div class="form-field">
        <label for="birthdate">Birth date *</label>
        <input id="birthdate" name="birthdate" type="date" required />
      </div>

      <!-- Select input example (required) -->
      <div class="form-field">
        <label for="gender">Gender *</label>
        <select id="gender" name="gender" required>
          <option value="">Select gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
          <option value="Prefer not to say">Prefer not to say</option>
        </select>
      </div>

      <!-- Interests (checkbox group)
           register_form.js validates that at least one checkbox is selected -->
      <fieldset class="form-field form-field-full">
        <legend>Areas of interest * (select at least one)</legend>
        <label><input type="checkbox" name="interests" value="Programming" /> Programming</label>
        <label><input type="checkbox" name="interests" value="Networking" /> Networking</label>
        <label><input type="checkbox" name="interests" value="Security" /> Security</label>
        <label><input type="checkbox" name="interests" value="Database" /> Databases</label>
      </fieldset>

      <!-- Experience (radio group)
           register_form.js validates that one radio is selected -->
      <fieldset class="form-field form-field-full">
        <legend>Experience level *</legend>
        <label><input type="radio" name="experience" value="Beginner" required /> Beginner</label>
        <label><input type="radio" name="experience" value="Intermediate" /> Intermediate</label>
        <label><input type="radio" name="experience" value="Advanced" /> Advanced</label>
        <label><input type="radio" name="experience" value="Expert" /> Expert</label>
      </fieldset>

      <!-- Optional textarea used in the summary -->
      <div class="form-field form-field-full">
        <label for="goals">Learning goals (optional)</label>
        <textarea id="goals" name="goals" rows="4"></textarea>
      </div>

      <!-- Optional newsletter checkbox -->
      <div class="form-field form-field-full">
        <label>
          <input type="checkbox" name="newsletter" />
          Subscribe to our newsletter
        </label>
      </div>

      <p id="status" class="meta" style="margin-top: 1rem;"></p>
      
      <!-- Submit button triggers JS validation + summary panel (no real backend in Part A) -->
      <div class="form-actions form-field-full">
        <button type="submit" class="btn-primary">Create account</button>
      </div>

    </form>
  </main>

  <!-- Minimal footer -->
  <footer class="site-footer">
    <div class="container footer-bottom">
      <small>&copy; 2025 DevDromos.</small>
    </div>
  </footer>

  <!-- Main app entry point: initRegisterForm() runs here safely -->
  <script type="module" src="./register.ts"></script>
</body>
</html>
