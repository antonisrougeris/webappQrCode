<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic metadata -->
  <meta charset="UTF-8" />
  <title>DevDromos - Books</title>

  <!-- Mobile-first responsive viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSS order: reset -> theme -> layout -> components -->
  <link rel="stylesheet" href="/assets/css/reset.css" />
  <link rel="stylesheet" href="/assets/css/theme.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>

<body>
  <!-- Shared site header (logo + navigation + cart badge link) -->
  <header class="site-header">
    <div class="container header-content">
      <div class="logo">
        <img class="logo-img" src="/assets/img/logo_Image.png" alt="DevDromos logo" />
        <span class="logo-text">DevDromos</span>
      </div>

      <!-- Mobile menu toggle button (handled by menu.ts) -->
      <button
        id="menuToggle"
        class="menu-toggle"
        aria-label="Toggle menu"
        aria-expanded="false"
        aria-controls="mainNav"
      >
        ☰
      </button>

      <!-- Main navigation
           data-cart-link is updated by cart-badge.ts -->
      <nav id="mainNav" class="main-nav">
        <a href="/index.html">Home</a>
        <a href="/src/pages/courses/courses.html">Courses</a>
        <a href="/src/pages/books/books.html" class="active">Books</a>
        <a href="/src/pages/about/about.html">About</a>
        <a href="/src/pages/cart/cart.html" data-cart-link>Cart</a>
        <a href="/src/pages/login/login.html" class="btn-outline">Login</a>
        <a href="/src/pages/register/register.html" class="btn-primary">Register</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- Page hero section -->
    <section class="hero">
      <div class="container hero-content">
        <h1>Books</h1>
        <p>
          Explore carefully selected books to support your learning journey.
        </p>
      </div>
    </section>

    <!-- Books listing section -->
    <section class="section section-muted">
      <div class="container">
        <h2 class="section-title">Available Books</h2>

        <!-- Search & filter controls
             These inputs are handled by books.ts -->
        <div class="filters">
          <input
            id="bookSearch"
            type="search"
            placeholder="Search books..."
            aria-label="Search books"
          />

          <select id="bookCategory" aria-label="Filter by category">
            <option value="All">All categories</option>
            <option value="Programming">Programming</option>
            <option value="Networking">Networking</option>
            <option value="Security">Security</option>
            <option value="Database">Database</option>
          </select>
        </div>

        <!-- Dynamic books grid (rendered by books.ts) -->
        <div id="booksGrid" class="grid grid-3"></div>

        <!-- Empty state message (shown when no books match filters) -->
        <p id="booksEmpty" class="meta" hidden>
          No books match your search criteria.
        </p>

        <!-- Loading state -->
        <p id="booksLoading" class="meta">
          Loading books...
        </p>

        <!-- Error state -->
        <p id="booksError" class="meta" style="color: var(--color-error, #dc2626);" hidden>
          Failed to load books. Please try again later.
        </p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container footer-bottom">
      <small>&copy; 2025 DevDromos.</small>
    </div>
  </footer>

  <!-- Main JS entry point -->
  <script type="module" src="/src/pages/books/books.ts"></script>
</body>
</html>
